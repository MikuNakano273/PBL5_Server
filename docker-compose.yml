services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: pbl5-api
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://admin:admin123@mongo:27017/pbl5?authSource=admin
      REDIS_HOST: redis
      MINIO_ENDPOINT: minio:9000
    ports:
      - "8000:8000"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - ./api:/api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    networks:
      - pbl5-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=2).read()"]
      interval: 15s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: pbl5-worker
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://admin:admin123@mongo:27017/pbl5?authSource=admin
      REDIS_HOST: redis
      MINIO_ENDPOINT: minio:9000
      INTERNAL_API_URL: http://api:8000
      YOLO_CONFIDENCE_THRESHOLD: 0.35
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      api:
        condition: service_healthy
    volumes:
      - ./worker:/worker
      - yolo_models:/models
    command: python -m app.main
    restart: unless-stopped
    networks:
      - pbl5-network

  mongo:
    image: mongo:7
    container_name: pbl5-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: pbl5
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - pbl5-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pbl5-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - pbl5-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: pbl5-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    networks:
      - pbl5-network

networks:
  pbl5-network:
    driver: bridge

volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  yolo_models:
    driver: local
