events {
  worker_processes auto;
  worker_connections 1024;
}

http {
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;

  # Gzip
  gzip on;
  gzip_types text/plain application/json application/javascript text/css;
  gzip_min_length 1024;

  # Rate limiting zones
  limit_req_zone $binary_remote_addr zone=mobile_api:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=cane_ingest:10m rate=100r/s;
  limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

  # Upstream NestJS API
  upstream nestjs_api {
    server api:3000;
    keepalive 32;
  }

  server {
    listen 80;
    server_name _;

    # Max upload size for image
    client_max_body_size 10M;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy no-referrer-when-downgrade;

    # ---- Health check ----
    location /api/health {
      proxy_pass http://nestjs_api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      access_log off;
    }

    # ---- Swagger docs ----
    location /docs {
      proxy_pass http://nestjs_api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ---- Login - strict rate limit ----
    location /api/mobile/v1/auth/login {
      limit_req zone=login burst=10 nodelay;
      limit_req_status 429;
      proxy_pass http://nestjs_api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ---- Mobile API ----
    location /api/mobile/ {
      limit_req zone=mobile_api burst=50 nodelay;
      limit_req_status 429;
      proxy_pass http://nestjs_api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
    }

    # ---- Cane device ingest - high throughput ----
    location /api/cane/ {
      limit_req zone=cane_ingest burst=200 nodelay;
      limit_req_status 429;
      proxy_pass http://nestjs_api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      # Forward device auth headers
      proxy_set_header x-device-code $http_x_device_code;
      proxy_set_header x-timestamp $http_x_timestamp;
      proxy_set_header x-signature $http_x_signature;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
    }

    # ---- Internal API - chỉ dùng trong private network ----
    # Uncomment để chặn từ ngoài, chỉ cho container nội bộ truy cập
    # location /api/internal/ {
    #   allow 172.0.0.0/8;
    #   deny all;
    #   proxy_pass http://nestjs_api;
    # }
    location /api/internal/ {
      proxy_pass http://nestjs_api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ---- Admin API ----
    location /api/admin/ {
      proxy_pass http://nestjs_api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ---- WebSocket / Socket.IO ----
    location /socket.io/ {
      proxy_pass http://nestjs_api;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 86400s;
      proxy_send_timeout 86400s;
    }

    # ---- Catch-all ----
    location / {
      proxy_pass http://nestjs_api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
    }
  }
}
