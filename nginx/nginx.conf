events {
  worker_processes auto;
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Logging format with detailed info
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for" '
                  'rt=$request_time uct="$upstream_connect_time" '
                  'uht="$upstream_header_time" urt="$upstream_response_time"';

  # Structured JSON logging for easier parsing
  log_format json_combined escape=json
  '{'
    '"time_local":"$time_local",'
    '"remote_addr":"$remote_addr",'
    '"remote_user":"$remote_user",'
    '"request":"$request",'
    '"status":$status,'
    '"body_bytes_sent":$body_bytes_sent,'
    '"http_referer":"$http_referer",'
    '"http_user_agent":"$http_user_agent",'
    '"request_time":$request_time,'
    '"upstream_response_time":"$upstream_response_time"'
  '}';

  access_log /var/log/nginx/access.log json_combined;
  error_log /var/log/nginx/error.log warn;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  client_max_body_size 100M;

  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_types text/plain application/json application/javascript text/css text/xml application/xml application/xml+rss;
  gzip_min_length 1024;
  gzip_comp_level 6;

  # Rate limiting zones
  limit_req_zone $binary_remote_addr zone=mobile_api:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=cane_ingest:10m rate=100r/s;
  limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
  limit_req_zone $binary_remote_addr zone=admin:10m rate=20r/s;
  limit_req_zone $binary_remote_addr zone=general:10m rate=50r/s;

  # Connection limiting
  limit_conn_zone $binary_remote_addr zone=addr:10m;
  limit_conn_zone $server_name zone=perserver:10m;

  # Upstream API with health check
  upstream nestjs_api {
    least_conn;
    server api:3000 max_fails=3 fail_timeout=30s;
    keepalive 32;
  }

  # Upstream services for monitoring dashboards
  upstream mongo_express {
    server mongo-express:8081;
  }

  upstream minio_console {
    server minio:9001;
  }

  upstream redis_monitoring {
    server api:3000;  # Can be extended with dedicated monitoring service
  }

  # HTTP to HTTPS redirect (optional - uncomment for production with SSL)
  # server {
  #   listen 80;
  #   server_name _;
  #   return 301 https://$host$request_uri;
  # }

  server {
    listen 80;
    server_name _;
    server_tokens off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ===== HEALTH CHECK (public) =====
    location /api/health {
      access_log off;
      proxy_pass http://nestjs_api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ===== NGINX STATUS (internal monitoring) =====
    location /nginx/status {
      stub_status on;
      access_log off;
      allow 172.16.0.0/12;  # Docker internal network
      allow 127.0.0.1;
      deny all;
    }

    # ===== DOCUMENTATION =====
    location /docs {
      proxy_pass http://nestjs_api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      access_log /var/log/nginx/docs.log main;
    }

    # ===== AUTH - STRICT RATE LIMIT =====
    location /api/mobile/v1/auth/login {
      limit_req zone=login burst=10 nodelay;
      limit_req_status 429;
      limit_conn addr 5;
      proxy_pass http://nestjs_api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
    }

    # ===== MOBILE API =====
    location /api/mobile/ {
      limit_req zone=mobile_api burst=50 nodelay;
      limit_req_status 429;
      limit_conn addr 20;
      proxy_pass http://nestjs_api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
    }

    # ===== CANE DEVICE INGEST (high throughput) =====
    location /api/cane/ {
      limit_req zone=cane_ingest burst=200 nodelay;
      limit_req_status 429;
      limit_conn addr 50;
      proxy_pass http://nestjs_api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      # Forward device authentication headers
      proxy_set_header x-device-code $http_x_device_code;
      proxy_set_header x-timestamp $http_x_timestamp;
      proxy_set_header x-signature $http_x_signature;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
    }

    # ===== ADMIN API =====
    location /api/admin/ {
      limit_req zone=admin burst=30 nodelay;
      limit_req_status 429;
      limit_conn addr 10;
      proxy_pass http://nestjs_api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
    }

    # ===== INTERNAL API (private network only) =====
    location /api/internal/ {
      allow 172.16.0.0/12;
      allow 127.0.0.1;
      deny all;
      proxy_pass http://nestjs_api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
    }

    # ===== WEBSOCKET / SOCKET.IO (real-time) =====
    location /socket.io/ {
      limit_req zone=general burst=100 nodelay;
      proxy_pass http://nestjs_api;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 86400s;
      proxy_send_timeout 86400s;
    }

    # ===== MANAGEMENT & MONITORING DASHBOARDS =====

    # MongoDB Management UI
    location /admin/mongo/ {
      allow 172.16.0.0/12;
      allow 127.0.0.1;
      deny all;

      proxy_pass http://mongo_express/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_redirect off;
    }

    # MinIO Console (S3 storage management)
    location /admin/storage/ {
      allow 172.16.0.0/12;
      allow 127.0.0.1;
      deny all;

      proxy_pass http://minio_console/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_redirect off;
    }

    # BullMQ Dashboard (job queue monitoring)
    location /admin/jobs/ {
      allow 172.16.0.0/12;
      allow 127.0.0.1;
      deny all;

      proxy_pass http://nestjs_api/admin/bull/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
    }

    # System monitoring/metrics (if available)
    location /admin/metrics/ {
      allow 172.16.0.0/12;
      allow 127.0.0.1;
      deny all;

      proxy_pass http://nestjs_api/metrics;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Web-based management dashboard (future)
    location /admin/dashboard/ {
      allow 172.16.0.0/12;
      allow 127.0.0.1;
      deny all;

      proxy_pass http://nestjs_api/admin/dashboard/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ===== CATCH-ALL DEFAULT ROUTE =====
    location / {
      limit_req zone=general burst=50 nodelay;
      proxy_pass http://nestjs_api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
    }

    # ===== ERROR PAGES =====
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    location = /404.html {
      internal;
      default_type application/json;
      return 404 '{"error":"Not Found","status":404}';
    }

    location = /50x.html {
      internal;
      default_type application/json;
      return 500 '{"error":"Internal Server Error","status":500}';
    }
  }
}
